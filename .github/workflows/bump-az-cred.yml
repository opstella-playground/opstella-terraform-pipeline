name: Bump Azure Credentials
on:
  workflow_call:
    inputs:
      tfvars_path:
        description: "Path to dev.tfvars file"
        required: false
        type: string
        default: "terraform/dev.tfvars"
      provider_path:
        description: "Path to provider.tf file"
        required: false
        type: string
        default: "terraform/provider.tf"

    secrets:
      AZURE_CLIENT_ID:
        description: "Azure Client ID"
        required: true
      AZURE_CLIENT_SECRET:
        description: "Azure Client Secret"
        required: true
      AZURE_TENANT_ID:
        description: "Azure Tenant ID"
        required: true
      AZURE_SUBSCRIPTION_ID:
        description: "Azure Subscription ID"
        required: true

jobs:
  Bump_Credentials:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update Azure Credentials in Terraform Files
        run: |
          # Use individual secrets
          CLIENT_ID="${{ secrets.AZURE_CLIENT_ID }}"
          CLIENT_SECRET="${{ secrets.AZURE_CLIENT_SECRET }}"
          SUBSCRIPTION_ID="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          TENANT_ID="${{ secrets.AZURE_TENANT_ID }}"

          # Update tfvars - replace credential values while preserving other content
          sed -i "s/tenant_id[[:space:]]*=[[:space:]]*\"[^\"]*\"/tenant_id       = \"$TENANT_ID\"/" "${{ inputs.tfvars_path }}"
          sed -i "s/subscription_id[[:space:]]*=[[:space:]]*\"[^\"]*\"/subscription_id = \"$SUBSCRIPTION_ID\"/" "${{ inputs.tfvars_path }}"
          sed -i "s/client_id[[:space:]]*=[[:space:]]*\"[^\"]*\"/client_id       = \"$CLIENT_ID\"/" "${{ inputs.tfvars_path }}"
          sed -i "s/client_secret[[:space:]]*=[[:space:]]*\"[^\"]*\"/client_secret   = \"$CLIENT_SECRET\"/" "${{ inputs.tfvars_path }}"

          # Update provider.tf - replace credential values in backend block while preserving other content
          sed -i "s/subscription_id[[:space:]]*=[[:space:]]*\"[^\"]*\"/subscription_id = \"$SUBSCRIPTION_ID\"/" "${{ inputs.provider_path }}"
          sed -i "s/tenant_id[[:space:]]*=[[:space:]]*\"[^\"]*\"/tenant_id       = \"$TENANT_ID\"/" "${{ inputs.provider_path }}"
          sed -i "s/client_id[[:space:]]*=[[:space:]]*\"[^\"]*\"/client_id       = \"$CLIENT_ID\"/" "${{ inputs.provider_path }}"
          sed -i "s/client_secret[[:space:]]*=[[:space:]]*\"[^\"]*\"/client_secret   = \"$CLIENT_SECRET\"/" "${{ inputs.provider_path }}"
